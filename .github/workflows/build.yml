name: Build SoulTrack Mobile

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
- name: Install Capacitor
  run: |
    npm install @capacitor/core@6 @capacitor/cli@6
    npm install @capacitor/android@6
    npm install @capacitor/push-notifications@6
     
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Add Android platform
        run: npx cap add android

      - name: Inject google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: soultrack-android.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/ios
          npm install @capacitor/push-notifications

      - name: Add iOS platform
        run: npx cap add ios

      - name: Inject GoogleService-Info.plist
        run: echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' > ios/App/App/GoogleService-Info.plist

      - name: Diagnostic
        run: |
          echo "=== Capacitor iOS version ==="
          cat node_modules/@capacitor/ios/package.json | grep '"version"'
          echo "=== Podfile content ==="
          cat ios/App/Podfile
          echo "=== pods_helpers.rb ==="
          cat node_modules/@capacitor/ios/scripts/pods_helpers.rb || echo "Pas de pods_helpers"

      - name: Set iOS deployment target
        run: |
          PODFILE="ios/App/Podfile"
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/assertDeploymentTarget(installer)//' "$PODFILE"
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" "$PODFILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' "$PBXPROJ"
          echo "=== Podfile après modification ==="
          cat "$PODFILE"

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: soultrack-ios
          path: ios/App/build
