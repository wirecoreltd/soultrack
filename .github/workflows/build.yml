name: Build SoulTrack Mobile

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/core@7 @capacitor/cli@7
          npm install @capacitor/android@7
          npm install @capacitor/push-notifications@7
          npm install @capacitor/splash-screen@7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Add Android platform
        run: npx cap add android

      - name: Add App Links intent-filter
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/activity>/i \
            <intent-filter android:autoVerify="true">\n\
                <action android:name="android.intent.action.VIEW" />\n\
                <category android:name="android.intent.category.DEFAULT" />\n\
                <category android:name="android.intent.category.BROWSABLE" />\n\
                <data android:scheme="https" android:host="www.soultrack.org" />\n\
            </intent-filter>' "$MANIFEST"
          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      - name: Generate app icons & splash
        run: |
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android

      - name: Set launch URL
        run: |
          sed -i 's|launchUrl = null|launchUrl = "https://www.soultrack.org/login"|g' android/app/src/main/java/org/soultrack/app/MainActivity.java 2>/dev/null || true

      - name: Inject google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Android navigation bar
        run: |
          # Passer targetSdk à 34 pour désactiver l'edge-to-edge forcé
          sed -i 's/targetSdkVersion = 35/targetSdkVersion = 34/' android/variables.gradle         

          # Patch styles.xml
          STYLES_FILE="android/app/src/main/res/values/styles.xml"
          sed -i 's|</style>|    <item name="android:navigationBarColor">#333699</item>\n    <item name="android:windowTranslucentNavigation">false</item>\n</style>|' "$STYLES_FILE"

          echo "=== variables.gradle ==="
          cat android/variables.gradle
          echo "=== styles.xml ==="
          cat "$STYLES_FILE"

      - name: Set version code
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "1.0.${{ github.run_number }}"/' android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode Keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > $GITHUB_WORKSPACE/soultrack.keystore

      - name: Print keystore SHA256 (temporaire - à supprimer après)
        run: |
          keytool -list -v -keystore $GITHUB_WORKSPACE/soultrack.keystore -alias soultrack -storepass soultrack123

      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/soultrack.keystore \
            -Pandroid.injected.signing.store.password=soultrack123 \
            -Pandroid.injected.signing.store.key.alias=soultrack \
            -Pandroid.injected.signing.key.alias=soultrack \
            -Pandroid.injected.signing.key.password=soultrack123

      - name: Build AAB Release
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/soultrack.keystore \
            -Pandroid.injected.signing.store.password=soultrack123 \
            -Pandroid.injected.signing.store.key.alias=soultrack \
            -Pandroid.injected.signing.key.alias=soultrack \
            -Pandroid.injected.signing.key.password=soultrack123

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: soultrack-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: soultrack-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/core@7 @capacitor/cli@7
          npm install @capacitor/ios@7
          npm install @capacitor/push-notifications@7

      - name: Add iOS platform
        run: npx cap add ios

      - name: Inject GoogleService-Info.plist
        run: echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' > ios/App/App/GoogleService-Info.plist

      - name: Set iOS deployment target
        run: |
          PODFILE="ios/App/Podfile"
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/assertDeploymentTarget(installer)//' "$PODFILE"
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" "$PODFILE"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' "$PBXPROJ"

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: soultrack-ios
          path: ios/App/build
