name: Build SoulTrack Mobile

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6
          npm install @capacitor/android@6
          npm install @capacitor/push-notifications@6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Add Android platform
        run: npx cap add android

      - name: Inject google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore soultrack.keystore \
            -alias soultrack \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass soultrack123 \
            -keypass soultrack123 \
            -dname "CN=SoulTrack, OU=Mobile, O=SoulTrack, L=Unknown, S=Unknown, C=US"
          cp soultrack.keystore android/app/soultrack.keystore

      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=soultrack.keystore \
            -Pandroid.injected.signing.store.password=soultrack123 \
            -Pandroid.injected.signing.key.alias=soultrack \
            -Pandroid.injected.signing.key.password=soultrack123

      - name: Build AAB Release
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=soultrack.keystore \
            -Pandroid.injected.signing.store.password=soultrack123 \
            -Pandroid.injected.signing.key.alias=soultrack \
            -Pandroid.injected.signing.key.password=soultrack123

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: soultrack-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: soultrack-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
